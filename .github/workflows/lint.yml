name: Lint

on:
  pull_request:
  push:
jobs:
  lint:
    name: Lint

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.1.7

      - name: Install current Bash on macOS
        if: runner.os == 'macOS'
        run: |
          command -v brew && brew install bash || true

      - uses: DeterminateSystems/nix-installer-action@v18
        continue-on-error: true # Self-hosted runners already have Nix installed

      - name: Install Attic
        run: |
          if ! command -v attic &> /dev/null; then
            ./.github/install-attic-ci.sh
          fi

      - name: Configure Attic
        run: |
          : "${CELLER_SERVER:=https://staging.attic.rs/}"
          : "${CELLER_CACHE:=attic-ci}"
          echo CELLER_CACHE=$CELLER_CACHE >>$GITHUB_ENV
          export PATH=$HOME/.nix-profile/bin:$PATH # FIXME
          attic login --set-default ci "$CELLER_SERVER" "$CELLER_TOKEN"
          attic use "$CELLER_CACHE"
        env:
          CELLER_SERVER: ${{ secrets.CELLER_SERVER }}
          CELLER_CACHE: ${{ secrets.CELLER_CACHE }}
          CELLER_TOKEN: ${{ secrets.CELLER_TOKEN }}

      - name: Cache dev shell
        run: |
          .ci/cache-shell.sh
          system=$(nix-instantiate --eval -E 'builtins.currentSystem')
          echo system=$system >>$GITHUB_ENV

      - name: Check rustfmt
        run: .ci/run just ci-rustfmt
